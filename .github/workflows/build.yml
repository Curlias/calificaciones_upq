name: Build All Platforms

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ── Android APK ────────────────────────────────────────────────────────────
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release

      - name: Zip bundle
        run: zip -r linux-release.zip build/linux/x64/release/bundle

      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: linux-release.zip
          retention-days: 30

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Zip Release
        shell: powershell
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath windows-release.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: windows-release.zip
          retention-days: 30

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter config --enable-macos-desktop
      - run: flutter pub get

      - name: Build macOS (ad-hoc signing)
        run: flutter build macos --release
        env:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"

      - name: Zip .app
        run: |
          zip -r macos-release.zip \
            "build/macos/Build/Products/Release/calificaciones_upq.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: macos-release.zip
          retention-days: 30
